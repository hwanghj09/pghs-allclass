<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026판교고 2학년반배정 한눈에보기</title>
  <style>
    :root {
      --bg: #eef2ff;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(160deg, #ecfeff 0%, #f8fafc 45%, #eef2ff 100%);
      color: var(--text);
    }

    main {
      width: min(1200px, 100% - 32px);
      margin: 20px auto;
    }

    .panel {
      background: var(--panel);
      border-radius: 16px;
      border: 1px solid var(--line);
      padding: 16px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.02em;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .summary .item {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    .item .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .item .value {
      font-size: 24px;
      font-weight: 800;
    }

    .sheet-wrap {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 78vh;
      border: 1px solid var(--line);
      border-radius: 10px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 860px;
      background: #fff;
    }

    th,
    td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.35;
      white-space: nowrap;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f1f5f9;
      text-align: center;
      font-weight: 700;
      color: #0f172a;
    }

    tbody td {
      text-align: left;
    }

    tbody th {
      background: #f8fafc;
      text-align: center;
      min-width: 62px;
      font-weight: 700;
      position: sticky;
      left: 0;
      z-index: 1;
    }

    tbody tr:nth-child(even) td {
      background: #fcfdff;
    }

    .empty {
      color: #9ca3af;
      font-style: italic;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .unassigned {
      margin-top: 10px;
      padding: 12px;
      border: 1px dashed #cbd5f5;
      border-radius: 12px;
      background: #f8faff;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #ede9fe;
      color: #4c1d95;
      font-size: 12px;
      font-weight: 700;
      margin-left: 4px;
      vertical-align: middle;
    }

    @media (max-width: 768px) {
      main {
        width: calc(100% - 16px);
        margin: 10px auto;
      }

      h1 {
        font-size: 24px;
      }

      .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>2026판교고 2학년반배정 한눈에보기</h1>
      <div id="meta" class="meta">데이터 로딩 중...</div>
    </section>

    <section class="panel summary">
      <div class="item">
        <div class="label">총 대상</div>
        <div id="total" class="value">-</div>
      </div>
      <div class="item">
        <div class="label">배정 완료</div>
        <div id="success" class="value">-</div>
      </div>
      <div class="item">
        <div class="label">미배정</div>
        <div id="failed" class="value">-</div>
      </div>
    </section>

    <section class="panel">
      <div class="sheet-wrap">
        <table>
          <thead>
            <tr>
              <th>번호</th>
              <th>1-1반</th>
              <th>1-2반</th>
              <th>1-3반</th>
              <th>1-4반</th>
              <th>1-5반</th>
              <th>1-6반</th>
              <th>1-7반</th>
              <th>1-8반</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="unassigned" class="unassigned hidden"></div>
      <div id="count" class="hint"></div>
    </section>
  </main>

  <script>
    const CLASS_COUNT = 8;
    const DEFAULT_MAX_ROW = 25;

    function maskName(name) {
      const text = String(name ?? "").trim();
      if (!text) return "";
      if (text.length === 1) return text;
      if (text.length === 2) return `${text[0]}O`;
      return `${text[0]}${"O".repeat(text.length - 2)}${text[text.length - 1]}`;
    }

    function parseAssignment(newId) {
      if (!newId) return null;
      const digits = String(newId).replace(/\D/g, "");
      if (digits.length !== 5) return null;

      const classNo = Number(digits.slice(1, 3));
      const seatNo = Number(digits.slice(3));
      if (!Number.isInteger(classNo) || !Number.isInteger(seatNo) || classNo < 1 || classNo > CLASS_COUNT || seatNo < 1) {
        return null;
      }

      return { classNo, seatNo };
    }

    function buildGrid(students) {
      const matrix = [];
      const unassigned = [];

      students.forEach((student) => {
        const parsed = parseAssignment(student.newId);
        if (!parsed) {
          if (student.status !== "success") {
            unassigned.push(student.name || "");
          }
          return;
        }

        const { classNo, seatNo } = parsed;
        const rowIdx = seatNo - 1;
        if (!matrix[rowIdx]) {
          matrix[rowIdx] = Array.from({ length: CLASS_COUNT }).fill("");
        }
        matrix[rowIdx][classNo - 1] = student.name || "";
      });

      const maxSeat = Math.max(matrix.length, DEFAULT_MAX_ROW);
      for (let i = 0; i < maxSeat; i += 1) {
        if (!matrix[i]) {
          matrix[i] = Array.from({ length: CLASS_COUNT }).fill("");
        }
      }

      return { matrix, unassigned };
    }

    function render(students) {
      const parsed = buildGrid(students);
      const rows = parsed.matrix
        .slice(0, parsed.matrix.length)
        .map((row, idx) => {
          const cells = row
            .map((name) => {
              const value = maskName(name);
              return `<td${value ? "" : " class=\"empty\""}>${value || "-"}</td>`;
            })
            .join("");
          return `<tr><th class="row-no">${idx + 1}번</th>${cells}</tr>`;
        })
        .join("");

      document.getElementById("tbody").innerHTML = rows;
      document.getElementById("count").textContent = `총 ${parsed.matrix.length}개 줄 기준으로 배정표를 렌더링했습니다.`;

      const unassignedPanel = document.getElementById("unassigned");
      if (parsed.unassigned.length === 0) {
        unassignedPanel.classList.add("hidden");
        unassignedPanel.innerHTML = "";
        return;
      }

      const list = parsed.unassigned.map((name) => `<li>${maskName(name)}</li>`).join("");
      unassignedPanel.innerHTML = `<strong>미배정 명단</strong> <span class=\"pill\">${parsed.unassigned.length}명</span><br/><ul>${list}</ul>`;
      unassignedPanel.classList.remove("hidden");
    }

    async function init() {
      const res = await fetch("./pangyo_fast_results.json");
      if (!res.ok) {
        throw new Error("JSON 로딩 실패");
      }

      const data = await res.json();
      const students = Array.isArray(data.students) ? data.students : [];

      const successCount = students.filter((student) => student.status === "success" && parseAssignment(student.newId)).length;
      const failedCount = Math.max(students.length - successCount, 0);

      document.getElementById("meta").textContent = `데이터 출처: ${data.meta?.source ?? "pangyo_fast_results.json"}${data.meta?.generatedAt ? ` (${data.meta.generatedAt})` : ""}`;
      document.getElementById("total").textContent = students.length;
      document.getElementById("success").textContent = successCount;
      document.getElementById("failed").textContent = failedCount;

      render(students);
    }

    init().catch((err) => {
      document.getElementById("meta").textContent = `오류: ${err.message}`;
      document.getElementById("count").textContent = "표시할 데이터가 없습니다.";
    });
  </script>
</body>
</html>
